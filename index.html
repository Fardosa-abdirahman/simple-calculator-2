<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="script.js"></script>
</head>
<body>
   
<!-- bedmas -->
 
    <div class="container max-w-[350] min-h-screen w-full bg-pink-200 flex flex-col items-center justify-center">

       <div class="subcontainer flex flex-col items-center  bg-gray-100 shadow-md shadow-[#333]  h-[60vh] w-[400px] py-6 px-4 rounded-lg">
        <!-- display input -->

        <input type="text"class="display h-[200px] w-full bg-white text-black rounded-lg  focus:outline-none   
                    focus:border-blue-500     
        focus:ring-none    
        focus:ring-blue-200        
        outline-none
        transition-colors text-right shadow-lg shadow-[#333] px-4 py-2 mb-4"  >
            <!-- buttons container -->
        <div class="btns grid grid-cols-4 grid-rows-5 gap-2 items-centerjustify-center w-full">
         <button id="clear" class=" rounded-full shadow-lg text-xl p-2  text-center">AC</button>
         <button id="delete" class="rounded-full shadow-lg text-xl p-2 text-center">DEL</button>
         <button class="operator rounded-full shadow-lg text-xl p-2 text-center">%</button>
         <button class="operator rounded-full shadow-lg text-xl p-2 text-center">+</button>
            <button class="numbers rounded-full shadow-lg text-xl p-2 text-center">9</button>

            <button class="numbers rounded-full shadow-lg text-xl p-2 text-center">8</button>
            <button class="numbers rounded-full shadow-lg text-xl p-2 text-center">7</button>
            <button class="operator rounded-full shadow-lg text-xl p-2 text-center">-</button>

            <button class="numbers rounded-full shadow-lg text-xl p-2 text-center">6</button>
            <button class="numbers rounded-full shadow-lg text-xl p-2 text-center">5</button>

            <button class="numbers rounded-full shadow-lg text-xl p-2 text-center">4</button>
            <button class="operator rounded-full shadow-lg text-xl p-2 text-center">/</button>

            <button class="numbers rounded-full shadow-lg text-xl p-2 text-center">3</button>
            <button class="numbers rounded-full shadow-lg text-xl p-2 text-center">2</button>

            <button class="numbers rounded-full shadow-lg text-xl p-2 text-center">1</button>
            <button class="operator rounded-full shadow-lg text-xl p-2 text-center">*</button>

            <button id="equal" class=" col-span-2 col-start-3 row-start-5 rounded-full shadow-lg text-xl p-2 bg-pink-300 text-center">=</button>
            <button class="numbers rounded-full shadow-lg text-xl p-2 text-center">0</button>
            <button class="operator rounded-full shadow-lg text-xl p-2 text-center">.</button>
            
            </div>
        </div>

       </div>
    </div>
    
</body>
</html>
